name: "Self-hosted Compose CD"

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: selfhosted-compose-cd-main
    cancel-in-progress: false

permissions:
    contents: read

env:
    COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME || 'kodus-ai' }}
    COMPOSE_BAKE: ${{ vars.DEPLOY_COMPOSE_BAKE || 'true' }}
    DOCKER_BUILDKIT: '1'
    DOCKER_BUILD_SUMMARY: ${{ vars.DEPLOY_DOCKER_BUILD_SUMMARY || 'false' }}
    DEPLOY_BUILDX_BUILDER: ${{ vars.DEPLOY_BUILDX_BUILDER || 'kodus-cd-builder' }}
    BUILDX_BUILDER: ${{ vars.DEPLOY_BUILDX_BUILDER || 'kodus-cd-builder' }}
    DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker-compose.dev.yml' }}
    DEPLOY_COMPOSE_PROFILES: ${{ vars.DEPLOY_COMPOSE_PROFILES || 'local-db' }}
    DEPLOY_COMPOSE_INFRA_SERVICES: ${{ vars.DEPLOY_COMPOSE_INFRA_SERVICES || 'rabbitmq db_postgres db_mongodb' }}
    DEPLOY_COMPOSE_BUILD_SERVICES: ${{ vars.DEPLOY_COMPOSE_BUILD_SERVICES || 'kodus-api web' }}
    DEPLOY_COMPOSE_SERVICES: ${{ vars.DEPLOY_COMPOSE_SERVICES || 'kodus-api worker worker-analytics webhooks' }}
    DEPLOY_COMPOSE_FRONTEND_SERVICES: ${{ vars.DEPLOY_COMPOSE_FRONTEND_SERVICES || 'web' }}
    DEPLOY_IMAGE_BUILD_MODE: ${{ vars.DEPLOY_IMAGE_BUILD_MODE || 'auto' }}
    DEPLOY_REBUILD_PATHS_REGEX: ${{ vars.DEPLOY_REBUILD_PATHS_REGEX || '(^docker/|^Dockerfile|^docker-compose|^package\\.json$|^yarn\\.lock$|^packages/kodus-common/|^packages/kodus-flow/|^apps/web/package\\.json$|^apps/web/yarn\\.lock$|^apps/web/package-lock\\.json$)' }}
    DEPLOY_FORCE_RECREATE: ${{ vars.DEPLOY_FORCE_RECREATE || 'true' }}
    DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || '/home/actions-runner/kodus-ai.env' }}
    ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || '/home/actions-runner/kodus-ai.env' }}
    DEPLOY_HEALTH_CONTAINERS: ${{ vars.DEPLOY_HEALTH_CONTAINERS || 'db_postgres rabbitmq kodus_api kodus_worker kodus_analytics_worker kodus_webhooks' }}
    DEPLOY_FRONTEND_HEALTH_CONTAINERS: ${{ vars.DEPLOY_FRONTEND_HEALTH_CONTAINERS || 'kodus_web' }}
    DEPLOY_HEALTH_TIMEOUT_SECONDS: ${{ vars.DEPLOY_HEALTH_TIMEOUT_SECONDS || '300' }}
    DEPLOY_API_HEALTH_URL: ${{ vars.DEPLOY_API_HEALTH_URL || 'http://127.0.0.1:3001/health' }}
    DEPLOY_WEBHOOK_PING_ENABLED: ${{ vars.DEPLOY_WEBHOOK_PING_ENABLED || 'true' }}
    DEPLOY_WEBHOOK_PING_URL: ${{ vars.DEPLOY_WEBHOOK_PING_URL || 'http://127.0.0.1:3332/github/webhook' }}
    DEPLOY_WEB_URL: ${{ vars.DEPLOY_WEB_URL || 'http://127.0.0.1:3000' }}

jobs:
    deploy:
        name: Deploy docker compose on local runner
        runs-on: ${{ fromJSON(vars.DEPLOY_RUNNER_LABELS_JSON || '["self-hosted","Linux","X64","mijak-manager"]') }}
        timeout-minutes: ${{ fromJSON(vars.DEPLOY_TIMEOUT_MINUTES || '45') }}

        steps:
            - name: Checkout Mijak main
              uses: actions/checkout@v6.0.2
              with:
                  ref: main
                  fetch-depth: 2
                  clean: false

            - name: Set up persistent Docker Buildx cache
              uses: docker/setup-buildx-action@v3
              with:
                  name: ${{ env.DEPLOY_BUILDX_BUILDER }}
                  driver: docker-container
                  keep-state: true
                  cleanup: false

            - name: Show Buildx cache state
              shell: bash
              run: |
                  set -euo pipefail
                  docker buildx inspect "$DEPLOY_BUILDX_BUILDER" --bootstrap
                  docker buildx du --builder "$DEPLOY_BUILDX_BUILDER" || true

            - name: Build compose arguments
              id: compose
              shell: bash
              run: |
                  set -euo pipefail
                  args=(--env-file "$DEPLOY_ENV_FILE" -f "$DEPLOY_COMPOSE_FILE")
                  if [ -n "${DEPLOY_COMPOSE_PROFILES:-}" ]; then
                    IFS=',' read -ra profiles <<< "$DEPLOY_COMPOSE_PROFILES"
                    for profile in "${profiles[@]}"; do
                      profile="${profile//[[:space:]]/}"
                      if [ -n "$profile" ]; then
                        args+=(--profile "$profile")
                      fi
                    done
                  fi

                  {
                    printf 'args<<COMPOSE_ARGS\n'
                    printf '%q ' "${args[@]}"
                    printf '\nCOMPOSE_ARGS\n'
                  } >> "$GITHUB_OUTPUT"

            - name: Preflight host and env
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Runner: ${RUNNER_NAME:-unknown}"
                  echo "Host: $(hostname)"
                  docker --version
                  docker compose version
                  docker buildx version

                  if [ ! -f "$DEPLOY_ENV_FILE" ]; then
                    echo "::error::Deploy env file not found at $DEPLOY_ENV_FILE. Create it on the self-hosted runner or set the DEPLOY_ENV_FILE repository variable."
                    exit 1
                  fi

                  echo "Using COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME"
                  echo "Using DEPLOY_COMPOSE_FILE=$DEPLOY_COMPOSE_FILE"
                  echo "Using DEPLOY_COMPOSE_PROFILES=${DEPLOY_COMPOSE_PROFILES:-<none>}"
                  echo "Using COMPOSE_BAKE=$COMPOSE_BAKE"
                  echo "Using DEPLOY_BUILDX_BUILDER=$DEPLOY_BUILDX_BUILDER"
                  echo "Using DEPLOY_COMPOSE_INFRA_SERVICES=$DEPLOY_COMPOSE_INFRA_SERVICES"
                  echo "Using DEPLOY_COMPOSE_BUILD_SERVICES=$DEPLOY_COMPOSE_BUILD_SERVICES"
                  echo "Using DEPLOY_COMPOSE_SERVICES=$DEPLOY_COMPOSE_SERVICES"
                  echo "Using DEPLOY_COMPOSE_FRONTEND_SERVICES=${DEPLOY_COMPOSE_FRONTEND_SERVICES:-<none>}"
                  echo "Using DEPLOY_IMAGE_BUILD_MODE=$DEPLOY_IMAGE_BUILD_MODE"
                  echo "Using DEPLOY_FORCE_RECREATE=$DEPLOY_FORCE_RECREATE"
                  echo "Using DEPLOY_ENV_FILE=$DEPLOY_ENV_FILE"

            - name: Validate docker compose config
              shell: bash
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC2206
                  compose_args=(${{ steps.compose.outputs.args }})
                  docker compose "${compose_args[@]}" config >/tmp/kodus-compose-cd.yml
                  grep -n "kodus-webhooks" /tmp/kodus-compose-cd.yml | head -20 || true

            - name: Decide image rebuild
              id: rebuild
              shell: bash
              run: |
                  set -euo pipefail

                  mode="${DEPLOY_IMAGE_BUILD_MODE:-auto}"
                  before="${{ github.event.before }}"
                  after="${{ github.sha }}"
                  event="${{ github.event_name }}"
                  rebuild=false
                  reason="No build-impacting files changed."
                  changed_files_file=/tmp/kodus-cd-changed-files.txt
                  : > "$changed_files_file"

                  case "$mode" in
                    always)
                      rebuild=true
                      reason="DEPLOY_IMAGE_BUILD_MODE=always"
                      ;;
                    never)
                      rebuild=false
                      reason="DEPLOY_IMAGE_BUILD_MODE=never"
                      ;;
                    auto)
                      if [ "$event" = "workflow_dispatch" ]; then
                        rebuild=true
                        reason="Manual workflow_dispatch defaults to rebuilding images in auto mode."
                      elif [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
                        rebuild=true
                        reason="No previous commit was available for diffing."
                      else
                        if ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
                          git fetch --no-tags --depth=1 origin "$before"
                        fi

                        git diff --name-only "$before" "$after" > "$changed_files_file"
                        if grep -Eq "$DEPLOY_REBUILD_PATHS_REGEX" "$changed_files_file"; then
                          rebuild=true
                          reason="A build-impacting file matched DEPLOY_REBUILD_PATHS_REGEX."
                        fi
                      fi
                      ;;
                    *)
                      echo "::error::DEPLOY_IMAGE_BUILD_MODE must be one of: auto, always, never. Got: $mode"
                      exit 1
                      ;;
                  esac

                  {
                    echo "rebuild=$rebuild"
                    echo "reason=$reason"
                  } >> "$GITHUB_OUTPUT"

                  {
                    echo "### Compose CD rebuild decision"
                    echo
                    echo "- mode: \`$mode\`"
                    echo "- rebuild images: \`$rebuild\`"
                    echo "- reason: $reason"
                    echo
                    echo "Changed files:"
                    if [ -s "$changed_files_file" ]; then
                      sed 's/^/- `/' "$changed_files_file" | sed 's/$/`/' | head -100
                    else
                      echo "- <not diffed>"
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"

                  echo "Image rebuild decision: $rebuild ($reason)"

            - name: Ensure compose infrastructure is running
              shell: bash
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC2206
                  compose_args=(${{ steps.compose.outputs.args }})
                  # shellcheck disable=SC2206
                  infra_services=($DEPLOY_COMPOSE_INFRA_SERVICES)
                  docker compose "${compose_args[@]}" up -d --no-recreate "${infra_services[@]}"

            - name: Build cached compose images
              if: steps.rebuild.outputs.rebuild == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC2206
                  compose_args=(${{ steps.compose.outputs.args }})
                  # shellcheck disable=SC2206
                  build_services=($DEPLOY_COMPOSE_BUILD_SERVICES)
                  docker compose "${compose_args[@]}" build --parallel "${build_services[@]}"

            - name: Skip image rebuild
              if: steps.rebuild.outputs.rebuild != 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Skipping docker compose build: ${{ steps.rebuild.outputs.reason }}"

            - name: Deploy backend compose services
              shell: bash
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC2206
                  compose_args=(${{ steps.compose.outputs.args }})
                  # shellcheck disable=SC2206
                  services=($DEPLOY_COMPOSE_SERVICES)
                  # shellcheck disable=SC2206
                  frontend_services=(${DEPLOY_COMPOSE_FRONTEND_SERVICES:-})
                  backend_services=()
                  for service in "${services[@]}"; do
                    is_frontend=false
                    for frontend_service in "${frontend_services[@]}"; do
                      if [ "$service" = "$frontend_service" ]; then
                        is_frontend=true
                        break
                      fi
                    done
                    if [ "$is_frontend" = "false" ]; then
                      backend_services+=("$service")
                    fi
                  done

                  if [ "${#backend_services[@]}" -eq 0 ]; then
                    echo "No backend compose services to deploy."
                    exit 0
                  fi

                  recreate_args=()
                  if [ "${DEPLOY_FORCE_RECREATE:-true}" = "true" ]; then
                    recreate_args+=(--force-recreate)
                  fi
                  docker compose "${compose_args[@]}" up -d --no-build "${recreate_args[@]}" "${backend_services[@]}"

            - name: Wait for service health
              shell: bash
              run: |
                  set -euo pipefail

                  wait_healthy() {
                    local container="$1"
                    local timeout_seconds="${2:-$DEPLOY_HEALTH_TIMEOUT_SECONDS}"
                    local start now state
                    start=$(date +%s)

                    while true; do
                      state=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)
                      if [ "$state" = "healthy" ] || [ "$state" = "running" ]; then
                        echo "$container is $state"
                        return 0
                      fi

                      now=$(date +%s)
                      if [ $((now - start)) -ge "$timeout_seconds" ]; then
                        echo "::error::$container did not become healthy within ${timeout_seconds}s (last state: ${state:-missing})"
                        docker logs --tail 120 "$container" || true
                        return 1
                      fi

                      echo "Waiting for $container (state: ${state:-missing})..."
                      sleep 5
                    done
                  }

                  # shellcheck disable=SC2206
                  health_containers=($DEPLOY_HEALTH_CONTAINERS)
                  # shellcheck disable=SC2206
                  frontend_health_containers=(${DEPLOY_FRONTEND_HEALTH_CONTAINERS:-})
                  for container in "${health_containers[@]}"; do
                    is_frontend=false
                    for frontend_container in "${frontend_health_containers[@]}"; do
                      if [ "$container" = "$frontend_container" ]; then
                        is_frontend=true
                        break
                      fi
                    done
                    if [ "$is_frontend" = "true" ]; then
                      continue
                    fi
                    wait_healthy "$container" "$DEPLOY_HEALTH_TIMEOUT_SECONDS"
                  done

            - name: Deploy frontend compose services
              if: env.DEPLOY_COMPOSE_FRONTEND_SERVICES != ''
              shell: bash
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC2206
                  compose_args=(${{ steps.compose.outputs.args }})
                  # shellcheck disable=SC2206
                  frontend_services=($DEPLOY_COMPOSE_FRONTEND_SERVICES)
                  recreate_args=()
                  if [ "${DEPLOY_FORCE_RECREATE:-true}" = "true" ]; then
                    recreate_args+=(--force-recreate)
                  fi
                  docker compose "${compose_args[@]}" up -d --no-build "${recreate_args[@]}" "${frontend_services[@]}"

            - name: Wait for frontend health
              if: env.DEPLOY_FRONTEND_HEALTH_CONTAINERS != ''
              shell: bash
              run: |
                  set -euo pipefail

                  wait_healthy() {
                    local container="$1"
                    local timeout_seconds="${2:-$DEPLOY_HEALTH_TIMEOUT_SECONDS}"
                    local start now state
                    start=$(date +%s)

                    while true; do
                      state=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)
                      if [ "$state" = "healthy" ] || [ "$state" = "running" ]; then
                        echo "$container is $state"
                        return 0
                      fi

                      now=$(date +%s)
                      if [ $((now - start)) -ge "$timeout_seconds" ]; then
                        echo "::error::$container did not become healthy within ${timeout_seconds}s (last state: ${state:-missing})"
                        docker logs --tail 120 "$container" || true
                        return 1
                      fi

                      echo "Waiting for $container (state: ${state:-missing})..."
                      sleep 5
                    done
                  }

                  # shellcheck disable=SC2206
                  frontend_health_containers=($DEPLOY_FRONTEND_HEALTH_CONTAINERS)
                  for container in "${frontend_health_containers[@]}"; do
                    wait_healthy "$container" "$DEPLOY_HEALTH_TIMEOUT_SECONDS"
                  done

            - name: Smoke test local routes
              shell: bash
              run: |
                  set -euo pipefail
                  api_health_file="${RUNNER_TEMP:-/tmp}/kodus-api-health.txt"
                  webhook_ping_file="${RUNNER_TEMP:-/tmp}/kodus-webhook-ping.txt"
                  rm -f "$api_health_file" "$webhook_ping_file"

                  curl -fsS "$DEPLOY_API_HEALTH_URL" >"$api_health_file"

                  if [ "$DEPLOY_WEBHOOK_PING_ENABLED" = "true" ]; then
                    curl -fsS -X POST \
                      -H 'content-type: application/json' \
                      -H 'x-github-event: ping' \
                      -d '{}' \
                      "$DEPLOY_WEBHOOK_PING_URL" >"$webhook_ping_file"
                    echo "Webhook ping route: $(cat "$webhook_ping_file")"
                  fi

                  curl -fsS "$DEPLOY_WEB_URL" >/dev/null
                  echo "API health: $(cat "$api_health_file")"

            - name: Restore runner workspace ownership
              if: always()
              shell: bash
              run: |
                  set -euo pipefail
                  uid=$(id -u)
                  gid=$(id -g)
                  docker run --rm \
                    -v "$PWD:/workspace" \
                    docker.io/library/alpine:3.22 \
                    sh -c "chown -R $uid:$gid /workspace/dist /workspace/apps/*/dist 2>/dev/null || true"

            - name: Show deployed containers
              if: always()
              shell: bash
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC2206
                  compose_args=(${{ steps.compose.outputs.args }})
                  docker compose "${compose_args[@]}" ps
