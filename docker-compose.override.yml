# Override aplicado automaticamente pelo `docker compose` (e portanto
# pelo `yarn docker:start`) quando esse arquivo existe no mesmo diretório
# do compose principal.
#
# Objetivo: permitir que ESSA worktree (`analytics-selfhosted`) coexista
# com a worktree principal (`kodus-ai`) sem colisão de container name,
# host port ou named volume. Volumes e networks ganham prefixo via
# `COMPOSE_PROJECT_NAME` automaticamente, então só precisamos sobrescrever
# o que está hard-coded no compose original.
#
# Para desativar (rodar exatamente como o compose principal): renomeie
# este arquivo (`mv docker-compose.override.yml _docker-compose.override.yml.off`).

name: analytics-selfhosted

# Tag `!override` força Compose a SUBSTITUIR a lista de portas em vez
# de concatenar (default da merge semântica). Sem isso ele publicaria
# tanto a porta original (que colide com a outra worktree) quanto a
# nova. Requer Compose v2.24+.

services:
    kodus-api:
        container_name: as_kodus_api
        ports: !override
            - '3011:3001'   # API HTTP   (era 3001)
            - '9329:9229'   # debugger   (era 9229)
            - '8100:8000'   # metrics    (era 8000)
        environment:
            # Enables POST /cockpit/admin/trigger-ingestion. Used by
            # `scripts/analytics/test-suite.sh` to fire a run on demand
            # instead of waiting for the cron tick. Production never sets
            # this; the endpoint returns 403 without it.
            - API_ANALYTICS_ALLOW_TRIGGER=true

    worker:
        container_name: as_kodus_worker
        ports: !override
            - '9331:9231'
            - '8101:8001'

    worker-analytics:
        container_name: as_kodus_analytics_worker
        ports: !override
            - '9341:9241'
            - '8111:8001'

    webhooks:
        container_name: as_kodus_webhooks
        ports: !override
            - '3432:3332'
            - '9332:9232'
            - '8102:8002'

    web:
        container_name: as_kodus_web
        ports: !override
            - '3010:3000'

    pyroscope:
        container_name: as_pyroscope
        ports: !override
            - '4140:4040'

    # Para os 3 serviços abaixo eu também declaro `aliases` na network
    # interna. Assim o container responde tanto pelo novo `container_name`
    # (visível no `docker ps`) quanto pelo nome ORIGINAL que o `.env` já
    # usa (`db_postgres`, `db_mongodb`, `rabbitmq`). Sem isso, eu teria
    # que mudar `API_PG_DB_HOST`, `API_MG_DB_HOST`, etc no `.env`.

    rabbitmq:
        container_name: as_rabbitmq
        ports: !override
            - '5772:5672'    # AMQP        (era 5672)
            - '15772:15672'  # mgmt UI     (era 15672)
            - '15792:15692'  # prometheus  (era 15692)
        networks:
            kodus-backend-services:
                aliases:
                    - rabbitmq

    db_postgres:
        container_name: as_db_postgres
        ports: !override
            - '5532:5432'    # Postgres    (era 5432)
        networks:
            kodus-backend-services:
                aliases:
                    - db_postgres

    db_mongodb:
        container_name: as_mongodb
        ports: !override
            - '27117:27017'  # Mongo       (era 27017)
        networks:
            kodus-backend-services:
                aliases:
                    - db_mongodb

# Sobrescreve as networks pra deixar de ser `external: true` e virarem
# isoladas. Sem isso as duas worktrees cairiam no MESMO bridge externo
# `kodus-backend-services`, e o DNS interno teria 2 `db_postgres`, 2
# `rabbitmq`, etc. — caos garantido. Forço um `name:` único pra essa
# worktree em vez de deixar herdar o name literal do compose original.
networks:
    kodus-backend-services:
        external: false
        name: as_kodus-backend-services
        driver: bridge
    shared-network:
        external: false
        name: as_shared-network
        driver: bridge
